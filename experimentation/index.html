<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="btnBell">the bell tolls</button>
    <audio id="sndBell">
        <source src="audio/Bell.wav">
    </audio>
</body>

<script>
    const sound = new Audio ("audio/Bell.wav")
    const bell = document.getElementById ("btnBell")

    bell.onclick = () => sound.play ()
    
</script>
</html>
